name: Deploy Hetzner

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HETZNER_SSH_KEY_B64: ${{ secrets.HETZNER_SSH_KEY_B64 }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          mkdir -p ~/.ssh
          # Prefer base64 secret to avoid multiline formatting issues in GitHub UI.
          # If decoding fails, fall back to multiline secret.
          if [ -n "$HETZNER_SSH_KEY_B64" ]; then
            CLEAN_B64="$(printf "%s" "$HETZNER_SSH_KEY_B64" | tr -d '\r\n\t ')"
            if ! printf "%s" "$CLEAN_B64" | base64 -d > ~/.ssh/id_ed25519 2>/dev/null; then
              echo "Invalid HETZNER_SSH_KEY_B64, falling back to HETZNER_SSH_KEY"
              printf "%s\n" "$HETZNER_SSH_KEY" > ~/.ssh/id_ed25519
            fi
          else
            printf "%s\n" "$HETZNER_SSH_KEY" > ~/.ssh/id_ed25519
          fi
          tr -d '\r' < ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.tmp
          mv ~/.ssh/id_ed25519.tmp ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Fail early if key is malformed.
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null
          ssh-keyscan -H "$HETZNER_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on server
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT }}
        run: |
          PORT="${HETZNER_PORT:-22}"
          ssh -i ~/.ssh/id_ed25519 -p "$PORT" "$HETZNER_USER@$HETZNER_HOST" '
            set -e
            cd /opt/food-scan-backend
            git pull --ff-only
            npm ci --omit=dev
            systemctl restart food-scan-backend
            systemctl is-active --quiet food-scan-backend
          '
